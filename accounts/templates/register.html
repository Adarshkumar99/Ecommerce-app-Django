{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card mb-4">
        <div class="card-header">
          <h5>Register</h5>
        </div>
        <div class="card-body">
          <p class="text-warning"><i>Register to create an account and start shopping</i><p>
          <form method="post" action="{% url 'register' %}">
            {% csrf_token %}
            <div class="mb-3">
              <label for="id_username" class="form-label">Username</label>
              <input type="text" name="username" class="form-control" id="id_username">
            </div>
            <div class="mb-3">
              <label for="id_first_name" class="form-label">First Name</label>
              <input type="text" name="first_name" class="form-control" id="id_first_name">
            </div>
            <input type="hidden" name="next" value="{{ request.GET.next }}">
            <div class="mb-3">
              <label for="id_last_name" class="form-label">Last Name</label>
              <input type="text" name="last_name" class="form-control" id="id_last_name">
            </div>
            <div class="mb-3">
              <label for="id_email" class="form-label">Email</label>
              <input type="email" name="email" class="form-control" id="id_email">
            </div>
            <div class="mb-3">
              <label for="id_password1" class="form-label">Password</label>
              <input type="password" name="password1" class="form-control" id="id_password1" required>
            </div>
            <div class="mb-3">
              <label for="id_password2" class="form-label">Confirm Password</label>
              <input type="password" name="password2" class="form-control" id="id_password2" required>
            </div>
            <div class="d-flex justify-content-center">
              <button type="submit" class="btn btn-primary">Register</button>
            </div>
          </form>
        </div>
        <div class="card-footer text-center"><p>Already have an account? <a href="{% url 'login' %}">Login</a></p></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
