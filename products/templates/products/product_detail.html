{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <h1>Product Detail</h1>
  <div class="row" style="min-height: 100vh;">

    <div class="col-md-6 mt-5" style="position: sticky; top: 0; height: 100vh; align-items: center;">
      <img src="{{ product.image.url }}" 
           alt="{{ product.name }}" 
           style="width: 100%; max-height: 90vh; object-fit: contain;">
    </div>

    <div class="col-md-6" style="height: 100vh; overflow-y: auto; padding: 2rem;">
      <h1>{{ product.name }}</h1>
      <p>{{ product.description|safe }}</p>
      <p><strong>Price: ${{ product.price }}</strong></p>
      {% if product.id|stringformat:"s" in cart_ids %}
        <a href="{% url 'cart_detail' %}" class="btn btn-success">
          <i class="bi bi-cart-check-fill mx-1"></i>Go to Cart
        </a>
      {% else %}
        <a href="{% url 'add_to_cart' product.id %}" class="btn btn-primary">
          <i class="bi bi-cart-check-fill mx-1"></i>Add to Cart
        </a>
      {% endif %}
    </div>

  </div>
</div>
{% endblock %}
