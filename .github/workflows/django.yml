name: Django CI

on:
  push:
    branches: ["main"] # Run when code is pushed to main branch
  pull_request:
    branches: ["main"] # Run when pull request is created on main branch

jobs:
  build:
    runs-on: ubuntu-latest # Use Ubuntu as the CI environment

    services:
      postgres: # ← PostgreSQL
        image: postgres:14
        env:
          POSTGRES_DB: test_ecommerce_db
          POSTGRES_USER: ecommerce_user
          POSTGRES_PASSWORD: 123456
        ports:
          - 5432:5432 # Expose PostgreSQL port
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4 # Clone the repository

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.9" # only 3.9

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt       # Install project dependencies

      - name: Run Tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALLOWED_HOSTS: localhost
          DB_NAME: test_ecommerce_db
          DB_USER: ecommerce_user
          DB_PASSWORD: 123456
          DB_HOST: localhost
          DB_PORT: 5432
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          pytest --tb=short            # ← instead of manage.py -> pytest
